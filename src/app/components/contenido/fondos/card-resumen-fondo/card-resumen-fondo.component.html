<p-card
  class="card-fondo"
  [class.selected]="seleccionado"
  (click)="seleccionar.emit()">

  <div class="contenido-card">
    <div class="header">
      <i [class]="icono"></i>
    </div>

    <div class="nombre">{{ nombre }}</div>

    <div class="saldo">
      {{ netoPeriodo | decimalFormat }}
    </div>

    <!-- subtotales del período — solo si hay movimientos -->
    <div class="periodo-detalle" *ngIf="movimientos > 0">
      <span class="ingreso-periodo">+{{ ingresosPeriodo | decimalFormat }}</span>
      <span class="separador">/</span>
      <span class="egreso-periodo">-{{ egresosPeriodo | decimalFormat }}</span>
    </div>

    <div class="footer">
      <span class="movimientos">{{ movimientos }} movimientos</span>
    </div>

  </div>
</p-card>
