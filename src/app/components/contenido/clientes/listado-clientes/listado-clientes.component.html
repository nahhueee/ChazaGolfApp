<div class="contenido">
    <app-encabezado-seccion titulo="Clientes" icono="pi pi-user">
        <p-button label="Nuevo Cliente" icon="pi pi-plus" routerLink="/clientes/add" />
    </app-encabezado-seccion>

    <form [formGroup]="filtros" autocomplete="off" class="filtros filtros-busqueda" (keyup.enter)='Buscar()'>
        <div class="izq">
            <!-- Nombre -->
            <p-floatlabel variant="on">
                <input pInputText formControlName="nombre"  type="text"/>
                <label>Nombre</label>
            </p-floatlabel>

            <!-- Condicion -->
            <p-floatlabel variant="on">
                <p-select [options]="condicionesIva" formControlName="condicionIva" optionValue="id" optionLabel="descripcion"/>
                <label>Condición IVA</label>
            </p-floatlabel>

            <!-- Documento -->
            <p-floatlabel variant="on">
                <input pInputText formControlName="documento" type="number"/>
                <label>Documento</label>
            </p-floatlabel>
        </div>
        <div class="der">
            <p-button label="Buscar" severity="primary" icon="pi pi-search" (onClick)="Buscar()"/>
            <p-button label="Limpiar" severity="secondary" icon="pi pi-filter-slash" (onClick)="LimpiarFiltros()" />
        </div>
    </form>
        
    <div class="tabla">
        <p-table 
        [value]="clientes"
        [lazy]="true"
        [paginator]="true"
        [rows]="10"
        [totalRecords]="totalRecords"
        (onLazyLoad)="Buscar($event)"
        [loading]="loading"
        [rowsPerPageOptions]="[10,20,50]"
        [tableStyle]="{ 'min-width': '60rem' }">
        
            <ng-template #header>
                <tr>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Telefono</th>
                    <th>Celular</th>
                    <th>Condición</th>
                    <th>Documento</th>
                    <th>Acciones</th>
                </tr>
            </ng-template>
            <ng-template #body let-cliente>
                <tr>
                    <td>{{ cliente.id }}</td>
                    <td>{{ cliente.nombre }}</td>
                    <td>{{ cliente.email }}</td>
                    <td>{{ cliente.telefono }}</td>
                    <td>{{ cliente.celular }}</td>
                    <td>{{ cliente.condicionIva }}</td>
                    <td>{{ cliente.documento }}</td>
                    <td>
                        <div class="acciones">
                            <p-button severity="warn" styleClass="p-button-sm" [rounded]="true" [outlined]="true" icon="pi pi-pencil" (onClick)="Editar(cliente.id)" pTooltip="Editar" tooltipPosition="bottom"/>
                            <!-- <p-button severity="primary" styleClass="p-button-sm" [rounded]="true" [outlined]="true" icon="pi pi-chart-line" (onClick)="VerEstadistica(cliente.id, cliente.nombre)" pTooltip="Estadisticas" tooltipPosition="bottom"/> -->
                        </div>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>

<!-- Modal Editar -->
<p-dialog [modal]="true" [(visible)]="mostrarmodalAddMod" [style]="{ width: '90vw' }">
   <ng-template #header>
        <div class="modal-header">
            <i class="pi pi-user"></i>
            <span>
                {{ clienteSeleccionado ? 'Editar Cliente' : 'Agregar Cliente' }}
            </span>
        </div>
    </ng-template>
    <app-addmod-clientes [clienteEditar]="clienteSeleccionado" (cerrar)="Actualizar($event)"/>
</p-dialog>
