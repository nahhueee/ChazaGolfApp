name: Deploy Web

on:
  push:
    branches:
      - main
      - test

concurrency:
  group: deploy-web-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm ci

      - name: Definir variables según rama
        id: vars
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "config=prod" >> "$GITHUB_OUTPUT"
            echo "remote_path=/www/wwwroot/creationserver.com/apps/chazagolf" >> "$GITHUB_OUTPUT"
          else
            echo "config=test" >> "$GITHUB_OUTPUT"
            echo "remote_path=/www/wwwroot/creationserver.com/apps/chazagolftest" >> "$GITHUB_OUTPUT"
          fi

      # npm run build:test / build:prod (no "ng build" directo): esos scripts
      # corren generate-version.js antes del build, que es lo que actualiza
      # src/app/version.ts con la versión de package.json.
      - name: Build
        run: npm run build:${{ steps.vars.outputs.config }}

      # Con --delete: son estáticos servidos por Nginx, hay que limpiar los bundles
      # con hash de builds anteriores. No hay estado de runtime que perder acá.
      - name: Subir build al VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: build/${{ steps.vars.outputs.config }}/browser/
          remote_path: ${{ steps.vars.outputs.remote_path }}/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_port: ${{ secrets.VPS_PORT }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_DEPLOY_KEY }}

      # Solo en prod: taguea el commit desplegado con la versión de package.json
      # (la misma que se generó en version.ts y se muestra en el login).
      - name: Crear tag de versión (solo prod)
        if: steps.vars.outputs.config == 'prod'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "El tag $TAG ya existe, no se crea de nuevo."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Deploy a produccion: $TAG"
            git push origin "$TAG"
          fi
